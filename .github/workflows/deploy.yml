name: Trigger Jenkins Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  trigger-jenkins:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Jenkins job
        env:
          JENKINS_HOST: ${{ secrets.JENKINS_HOST }}
          JENKINS_USERNAME: ${{ secrets.JENKINS_USERNAME }}
          JENKINS_API_TOKEN: ${{ secrets.JENKINS_API_TOKEN }}
          JENKINS_JOB: ${{ secrets.JENKINS_JOB }}
        run: |
          set -euo pipefail

          echo "Declenchement du job Jenkins..."
          curl --fail --silent --show-error \
            -X POST \
            "${JENKINS_HOST}/job/${JENKINS_JOB}/build" \
            --user "${JENKINS_USERNAME}:${JENKINS_API_TOKEN}"

          echo "Job Jenkins declenche avec succes."
